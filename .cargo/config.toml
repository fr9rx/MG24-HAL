
[build]
# Set default target for Cortex-M33 with hardware FPU
target = "thumbv8m.main-none-eabihf"

rustflags = [
  "-C", "link-arg=-Tlink.x",
]

# Alternative runners (uncomment as needed)
# runner = "arm-none-eabi-gdb -q -x openocd.gdb"
# runner = "pyocd gdb --target efr32mg24 --"

[alias]
# Convenient aliases
rb = "build --release"
rr = "run --release"
size = "size --"
